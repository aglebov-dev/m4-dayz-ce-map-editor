name: build windows exe

# Сборка редактора в один .exe (pyside6-deploy -> Nuitka, onefile).
#   * тег vX.Y.Z  -> сборка + GitHub Release с приложенным exe/zip;
#   * кнопка Run workflow -> та же сборка, результат лежит в Artifacts.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write        # нужно, чтобы создать Release по тегу

env:
  PYTHON_VERSION: "3.14"
  APP_NAME: "M4 DayZ CE Map Editor"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Кеш Nuitka: туда складываются скачиваемые им ccache/dependency-walker и объектные
      # файлы. Без него каждая сборка тянет их заново и компилирует с нуля.
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'src/pysidedeploy.spec') }}
          restore-keys: nuitka-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # В коммит-спеке лежат абсолютные пути машины разработчика — переписываем их
      # на пути раннера. Сами флаги сборки берутся из src/pysidedeploy.spec.
      - name: Generate CI spec
        run: |
          pwsh tools\make_ci_spec.ps1 -RepositoryRoot . -PythonPath (Get-Command python).Source
          Get-Content src\pysidedeploy.ci.spec

      # pyside6-deploy копирует exe в exec_directory, но сам каталог не создаёт.
      - name: Build exe
        working-directory: src
        run: |
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          pyside6-deploy -c pysidedeploy.ci.spec --force --keep-deployment-files -v

      # Что именно и куда положила сборка — без этого падение на упаковке нечитаемо.
      - name: Inspect build output
        if: always()
        run: |
          Get-ChildItem -Path dist, src -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
            Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize | Out-String -Width 200
          Write-Host "--- dist ---"
          Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | Out-String -Width 200
          Write-Host "--- src (верхний уровень) ---"
          Get-ChildItem src -ErrorAction SilentlyContinue | Out-String -Width 200

      - name: Package
        id: package
        run: |
          # Имя exe задаёт title из спеки, но пробелы в нём pyside6-deploy/Nuitka могут
          # нормализовать по-своему, поэтому ищем по факту: самый свежий exe в dist\,
          # а если копия туда не доехала -- в src\ (onefile кладёт его рядом с app.py).
          # Промежуточный standalone-бинарь Nuitka зовётся "_<name>.exe" -- его пропускаем.
          $candidates = Get-ChildItem -Path dist, src -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { -not $_.Name.StartsWith("_") } |
            Sort-Object LastWriteTime -Descending
          if (-not $candidates) { throw "exe not found: сборка ничего не положила ни в dist\, ни в src\" }
          $exe = $candidates[0].FullName
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "built: $exe ($size MB)"
          $version = "dev-" + $env:GITHUB_SHA.Substring(0, 7)
          if ($env:GITHUB_REF -like "refs/tags/*") { $version = $env:GITHUB_REF -replace "^refs/tags/", "" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = Join-Path (Resolve-Path dist) "$env:APP_NAME $version.zip"
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          # Отдаём только сам onefile-exe: рядом Nuitka оставляет промежуточный "_<name>.exe".
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "exe=$exe"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip=$zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }} ${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.exe }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.package.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.exe }}
            ${{ steps.package.outputs.zip }}
